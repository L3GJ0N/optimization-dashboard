name: build

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for all tags and branches

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v6

      - name: Run pre-commit hooks
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            SKIP=no-commit-to-branch uvx pre-commit run --show-diff-on-failure --all-files --color=always
          else
            uvx pre-commit run --show-diff-on-failure --from-ref origin/${{ github.event.pull_request.base.ref }} --to-ref HEAD --color=always
          fi
        shell: bash

      - name: Install dependencies
        run: uv sync --extra dev
        shell: bash

      - name: Run unit tests (optimization)
        run: uv run pytest tests/test_optimization/ --verbose --color=yes --junitxml=test_optimization-results.xml
        shell: bash

      - name: Publish pytest results for optimization
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test_optimization-results.xml

      - name: Run unit tests (integration)
        run: uv run pytest tests/test_integration/ --verbose
        shell: bash

      - name: Run unit tests (ui)
        run: uv run pytest tests/test_ui/ --verbose
        shell: bash

      - name: Install browsers
        run: |
          source .venv/bin/activate
          playwright install
        shell: bash

      - name: Run unit tests (e2e)
        run: uv run pytest tests/test_e2e/
        shell: bash

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main'
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        if: github.ref == 'refs/heads/main'
        with:
          context: .
          file: ./Dockerfile
          tags: ghcr.io/l3gj0n/optimization-dashboard:latest
          push: true
